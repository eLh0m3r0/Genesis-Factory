# Genesis Factory Heartbeat Configuration
# Copy to config.yaml and fill in your values.

telegram:
  # Same bot token used by BOTH Claude Code Channels and this heartbeat daemon.
  # One bot, one chat — Channels handles two-way conversation with the human,
  # heartbeat sends one-way alerts/triggers. Works even if Claude Code is down.
  bot_token: "YOUR_TELEGRAM_BOT_TOKEN"
  chat_id: "YOUR_TELEGRAM_CHAT_ID"

# Schedule times in 24-hour format (HH:MM), LOCAL timezone of the machine.
# The heartbeat uses the system clock — no UTC conversion needed.
schedule:
  # Build cycles — when to look for stories and build them (Mon-Fri).
  # Single time or list of times. More times = more stories per day.
  build: "22:00"
  # build: ["10:00", "14:00", "22:00"]   # 3x daily
  # build: ["09:00", "12:00", "15:00", "18:00", "22:00"]  # every 3 hours

  # How many stories per build cycle:
  # "single"     — one story, then stop (default)
  # "continuous" — keep building until backlog empty or rate-limited
  build_mode: "single"

  morning_brief: "07:00"   # Daily: status report sent to Telegram
  discovery: "02:00"       # Sundays only: competitor research, new stories
  self_improvement: "23:00" # Fridays only: factory improves itself
  retro: "10:00"           # Sundays only: weekly retrospective

# How often to check project monitors (seconds)
monitor_interval_seconds: 300

# Projects directory
projects_dir: "~/projects"

# Alert cooldown (seconds) — suppress repeated alerts for same monitor
alert_cooldown_seconds: 900  # 15 minutes

# Disk space thresholds (GB free) — progressive alerts:
#   warning: below disk_warning_gb (default 10 GB)
#   alert:   below 5 GB
#   critical: below 2 GB (triggers automatic log cleanup)
disk_warning_gb: 10

# System health check interval (seconds)
health_check_interval_seconds: 3600

# Optional: environment variables that monitors depend on.
# Heartbeat warns at startup if any are missing (does not crash).
required_env_vars: []
# Example: ["GITHUB_TOKEN", "BINANCE_API_KEY"]
