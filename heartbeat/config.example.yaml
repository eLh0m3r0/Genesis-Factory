# Genesis Factory Heartbeat Configuration
# Copy to config.yaml and fill in your values.

telegram:
  bot_token: "YOUR_TELEGRAM_BOT_TOKEN"
  chat_id: "YOUR_TELEGRAM_CHAT_ID"

# Schedule times in 24-hour format (HH:MM), LOCAL timezone of the machine.
# The heartbeat uses the system clock — no UTC conversion needed.
schedule:
  nightly: "22:00"         # Mon-Fri: pick top story, implement, test, merge
  morning_brief: "07:00"   # Daily: status report sent to Telegram
  discovery: "02:00"       # Sundays only: competitor research, new stories
  self_improvement: "23:00" # Fridays only: factory improves itself
  retro: "10:00"           # Sundays only: weekly retrospective

# How often to check project monitors (seconds)
monitor_interval_seconds: 300

# Projects directory
projects_dir: "~/projects"

# Alert cooldown (seconds) — suppress repeated alerts for same monitor
alert_cooldown_seconds: 900  # 15 minutes

# Disk space warning threshold (GB free)
disk_warning_gb: 10

# System health check interval (seconds)
health_check_interval_seconds: 3600
